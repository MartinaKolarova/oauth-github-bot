<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub bot</title>

    <style>
      #output {
        white-space: pre-wrap;
        font-family: monospace;
      }
    </style>
  </head>

  <body>
    <h2>GitHub bot</h2>

    <input id="input" placeholder="Zeptej se na své repozitáře..." />
    <button onclick="send()">Odeslat</button>

    <pre id="output"></pre>

    <script>
      async function send() {
        const text = document.getElementById('input').value.trim();

        if (!text) {
          document.getElementById('output').textContent = 'Zadej dotaz';
          return;
        }

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ message: text }),
          });

          if (!res.ok) {
            document.getElementById('output').textContent =
              'Chyba nebo nejsi přihlášená';
            return;
          }

          const data = await res.json();

          // pokud backend vrátí repo (pole)
          if (Array.isArray(data)) {
            document.getElementById('output').textContent = data
              .filter((r) => r && r.name)
              .map((r, i) => {
                const index = String(i + 1).padEnd(3, ' ');
                const name = r.name.padEnd(30, ' ');
                return `${index}${name} ⭐ ${r.stargazers_count}`;
              })
              .join('\n');
          } else {
            // fallback (např. textová odpověď)
            document.getElementById('output').textContent = data;
          }
        } catch (err) {
          document.getElementById('output').textContent = 'Chyba spojení';
        }
      }
    </script>
  </body>
</html>
